<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BuLo Sint-Franciscus — Inloggen</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#0d1b2e 0%,#1a0a2e 50%,#0d1b2e 100%);
  font-family:'Nunito',sans-serif;}
.stars{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle 3s infinite}
@keyframes twinkle{0%,100%{opacity:.2;transform:scale(1)}50%{opacity:1;transform:scale(1.3)}}
.box{position:relative;z-index:1;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);
  border-radius:24px;padding:40px 36px;width:min(420px,94vw);
  box-shadow:0 20px 60px rgba(0,0,0,.6);backdrop-filter:blur(10px);text-align:center}
.logo{width:260px;border-radius:10px;margin-bottom:20px;box-shadow:0 4px 20px rgba(0,0,0,.5)}
h2{font-family:'Fredoka One',cursive;color:#f5c518;font-size:1.6rem;margin-bottom:6px}
.sub{color:rgba(255,255,255,.5);font-size:.85rem;margin-bottom:28px}
label{display:block;text-align:left;color:rgba(255,255,255,.7);font-size:.82rem;font-weight:700;margin-bottom:4px;margin-top:16px}
input{width:100%;padding:12px 16px;border-radius:12px;border:2px solid rgba(255,255,255,.15);
  background:rgba(255,255,255,.08);color:#fff;font-size:1rem;font-family:'Nunito',sans-serif;outline:none;transition:.2s}
input:focus{border-color:#f5c518;background:rgba(245,197,24,.08)}
input::placeholder{color:rgba(255,255,255,.3)}
.btn{width:100%;margin-top:24px;padding:14px;border:none;border-radius:14px;
  background:linear-gradient(135deg,#f5c518,#ff9500);color:#1a0a00;
  font-family:'Fredoka One',cursive;font-size:1.2rem;cursor:pointer;
  box-shadow:0 4px 16px rgba(245,197,24,.4);transition:.2s}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(245,197,24,.5)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.err{margin-top:14px;padding:10px 14px;border-radius:10px;background:rgba(220,50,50,.2);
  border:1px solid rgba(220,50,50,.4);color:#ff8888;font-size:.85rem;display:none}
.online{margin-top:16px;color:rgba(255,255,255,.4);font-size:.78rem}
.onlinedot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#00b86b;margin-right:5px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>

  <h2>🎮 3D Schoolwereld</h2>
  <p class="sub">Log in om mee te spelen</p>
  <label>Gebruikersnaam</label>
  <input type="text" id="username" placeholder="Jouw naam" autocomplete="username" autocapitalize="none">
  <label>Wachtwoord</label>
  <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
  <button class="btn" id="loginBtn" onclick="doLogin()">Inloggen 🚀</button>
  <div class="err" id="err"></div>
  <div class="online"><span class="onlinedot"></span><span id="onlineCount">...</span> leerlingen online</div>
</div>
<script>
// Sterren achtergrond
const sc = document.getElementById('stars');
for(let i=0;i<80;i++){
  const s=document.createElement('div'); s.className='star';
  const size=Math.random()*3+1;
  s.style.cssText=`width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%;animation-delay:${Math.random()*3}s;animation-duration:${2+Math.random()*3}s`;
  sc.appendChild(s);
}

// Als al ingelogd, doorsturen
const token = localStorage.getItem('bulo_token');
if(token) window.location.href='/game.html';

// Enter key
document.addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });

async function doLogin(){
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('err');
  err.style.display='none';
  if(!username||!password){ showErr('Vul gebruikersnaam en wachtwoord in'); return; }
  btn.disabled=true; btn.textContent='Even wachten...';
  try {
    const r = await fetch('/api/login', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})});
    const data = await r.json();
    if(!r.ok){ showErr(data.error||'Inloggen mislukt'); btn.disabled=false; btn.textContent='Inloggen 🚀'; return; }
    localStorage.setItem('bulo_token', data.token);
    localStorage.setItem('bulo_user', JSON.stringify(data.user));
    window.location.href = data.user.role==='admin' ? '/admin.html' : '/game.html';
  } catch(e){ showErr('Server niet bereikbaar'); btn.disabled=false; btn.textContent='Inloggen 🚀'; }
}

function showErr(msg){ const e=document.getElementById('err'); e.textContent=msg; e.style.display='block'; }

// Online teller ophalen
setInterval(async()=>{
  try {
    // Simpele ping — geen auth nodig voor count
    document.getElementById('onlineCount').textContent='Klaar om te spelen';
  } catch(e){}
}, 5000);
</script>
</body>
</html>
